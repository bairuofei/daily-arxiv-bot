name: Daily Arxiv Summary Bot

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          # 注意这里安装的是新版库 google-genai
          pip install google-genai arxiv

      - name: Run Python Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python main.py

      - name: Update README
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          if [ -f summary.txt ]; then
            echo "## 每日学术速览 ($(date +'%Y-%m-%d'))" > README.md
            cat summary.txt >> README.md
            git add README.md
            git commit -m "Update daily summary"
            git push
          fi
