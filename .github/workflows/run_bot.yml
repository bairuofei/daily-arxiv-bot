name: Daily Arxiv Summary Bot

on:
  schedule:
    - cron: '0 0 * * *' # 每天北京时间早上 8 点运行 (UTC 0:00)
  workflow_dispatch:      # 允许你手动点击按钮测试

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install google-generativeai arxiv

      - name: Run Python Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python main.py

      - name: Update README
        run: |
          echo "## 每日学术速览 ($(date +'%Y-%m-%d'))" > README.md
          cat summary.txt >> README.md
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add README.md
          git commit -m "Update daily summary"
          git push
